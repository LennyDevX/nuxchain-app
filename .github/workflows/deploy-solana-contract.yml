name: Deploy NUX P2P Escrow (Solana)

# Triggered manually from GitHub Actions → Run workflow
on:
  workflow_dispatch:
    inputs:
      cluster:
        description: 'Target cluster'
        required: true
        default: 'mainnet-beta'
        type: choice
        options:
          - mainnet-beta
          - devnet
      skip_build:
        description: 'Skip build (use cached program binary)'
        required: false
        default: false
        type: boolean

env:
  ANCHOR_VERSION: '0.30.1'
  SOLANA_VERSION: 'stable'
  PROGRAM_NAME: 'nux_p2p_escrow'

jobs:
  deploy:
    name: Build & Deploy Anchor Program
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Rust ────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      # ── 3. Cache Cargo & Anchor build ─────────────────────────
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            programs/nux-p2p-escrow/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── 4. Install Solana CLI ──────────────────────────────────
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      # ── 5. Install Anchor CLI ──────────────────────────────────
      - name: Install Anchor AVM
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install ${{ env.ANCHOR_VERSION }}
          avm use ${{ env.ANCHOR_VERSION }}
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      # ── 6. Write deployer keypair from secret ─────────────────
      - name: Setup deployer keypair
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.SOLANA_DEPLOYER_KEYPAIR_JSON }}' > ~/.config/solana/deployer.json
          solana config set --keypair ~/.config/solana/deployer.json
          solana config set --url ${{ github.event.inputs.cluster }}
          echo "Deployer address: $(solana address)"

      # ── 6b. Restore program keypair (keeps same Program ID on re-deploys) ──
      - name: Setup program keypair
        run: |
          mkdir -p target/deploy
          if [ -n "${{ secrets.SOLANA_PROGRAM_KEYPAIR_JSON }}" ]; then
            echo '${{ secrets.SOLANA_PROGRAM_KEYPAIR_JSON }}' > target/deploy/nux_p2p_escrow-keypair.json
            echo "Using stored program keypair"
          else
            echo "No program keypair stored — will generate a new one on build"
          fi

      # ── 7. Check deployer balance ──────────────────────────────
      - name: Check deployer SOL balance
        run: |
          BALANCE=$(solana balance --url ${{ github.event.inputs.cluster }})
          echo "Balance: $BALANCE"

      # ── 8. Build Anchor program ────────────────────────────────
      - name: Build Anchor program
        if: ${{ !inputs.skip_build }}
        run: |
          cd programs/nux-p2p-escrow
          anchor build 2>&1
        working-directory: ${{ github.workspace }}

      # ── 9. Print program ID ────────────────────────────────────
      - name: Print program ID
        run: |
          PROGRAM_ID=$(solana address -k target/deploy/${{ env.PROGRAM_NAME }}-keypair.json)
          echo "Program ID: $PROGRAM_ID"
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV

      # ── 10. Deploy program ────────────────────────────────────
      - name: Deploy Anchor program
        run: |
          anchor deploy \
            --provider.cluster ${{ github.event.inputs.cluster }} \
            --provider.wallet ~/.config/solana/deployer.json \
            --program-name ${{ env.PROGRAM_NAME }} \
            2>&1
        working-directory: ${{ github.workspace }}

      # ── 11. Copy IDL to src ───────────────────────────────────
      - name: Copy IDL to src/abi
        run: |
          mkdir -p src/abi
          cp target/idl/${{ env.PROGRAM_NAME }}.json src/abi/nux-p2p-escrow-idl.json
          echo "IDL copied successfully"
          cat src/abi/nux-p2p-escrow-idl.json | head -5

      # ── 12. Commit IDL & print next steps ────────────────────
      - name: Commit IDL back to repo
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add src/abi/nux-p2p-escrow-idl.json
          git diff --staged --quiet || git commit -m "chore: update P2P escrow IDL after deploy to ${{ github.event.inputs.cluster }}"
          git push origin HEAD

      # ── 13. Summary ──────────────────────────────────────────
      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo "✅ Deployment Complete!"
          echo "Program ID: $PROGRAM_ID"
          echo "Cluster:    ${{ github.event.inputs.cluster }}"
          echo ""
          echo "Next steps:"
          echo "  1. Set VITE_P2P_PROGRAM_ID=$PROGRAM_ID in Vercel"
          echo "  2. Set VITE_P2P_DEPLOYED=true in Vercel"
          echo "  3. Call initialize_marketplace once from admin wallet"
          echo "=========================================="
