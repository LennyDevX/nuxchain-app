<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Purple gradient for accents -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Black background -->
  <rect width="512" height="512" fill="#000000" rx="80"/>
  
  <!-- Subtle gradient overlay -->
  <rect width="512" height="512" fill="url(#purpleGradient)" opacity="0.05" rx="80"/>
  
  <!-- Decorative blockchain dots -->
  <g opacity="0.15">
    <circle cx="80" cy="80" r="8" fill="#9333ea"/>
    <circle cx="432" cy="80" r="8" fill="#9333ea"/>
    <circle cx="80" cy="432" r="8" fill="#9333ea"/>
    <circle cx="432" cy="432" r="8" fill="#9333ea"/>
  </g>
  
  <!-- NUX Text with modern style -->
  <g filter="url(#glow)">
    <!-- Letter N -->
    <text x="80" y="320" font-family="Arial, sans-serif" font-size="180" font-weight="900" 
          fill="url(#purpleGradient)" letter-spacing="-8">N</text>
    
    <!-- Letter U -->
    <text x="210" y="320" font-family="Arial, sans-serif" font-size="180" font-weight="900" 
          fill="url(#purpleGradient)" letter-spacing="-8">U</text>
    
    <!-- Letter X -->
    <text x="340" y="320" font-family="Arial, sans-serif" font-size="180" font-weight="900" 
          fill="url(#purpleGradient)" letter-spacing="-8">X</text>
  </g>
  
  <!-- Accent lines under text -->
  <line x1="60" y1="350" x2="180" y2="350" stroke="url(#purpleGradient)" stroke-width="4" stroke-linecap="round"/>
  <line x1="210" y1="350" x2="330" y2="350" stroke="url(#purpleGradient)" stroke-width="4" stroke-linecap="round"/>
  <line x1="360" y1="350" x2="450" y2="350" stroke="url(#purpleGradient)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Tech elements (hexagons) -->
  <g opacity="0.2" stroke="url(#purpleGradient)" stroke-width="2" fill="none">
    <!-- Top left hexagon -->
    <path d="M 100 100 L 130 85 L 160 100 L 160 130 L 130 145 L 100 130 Z"/>
    <!-- Bottom right hexagon -->
    <path d="M 380 360 L 410 345 L 440 360 L 440 390 L 410 405 L 380 390 Z"/>
  </g>
  
  <!-- Corner accent dots -->
  <circle cx="256" cy="50" r="6" fill="url(#purpleGradient)" opacity="0.8"/>
  <circle cx="50" cy="256" r="6" fill="url(#purpleGradient)" opacity="0.8"/>
  <circle cx="462" cy="256" r="6" fill="url(#purpleGradient)" opacity="0.8"/>
  <circle cx="256" cy="462" r="6" fill="url(#purpleGradient)" opacity="0.8"/>
  
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#purpleGradient)" stroke-width="1" opacity="0.3"/>
</svg>
