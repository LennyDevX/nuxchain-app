"""
Activity aggregate - combines all types of activities
"""
type Activity @entity(immutable: true) {
  id: ID!
  type: ActivityType!
  user: Bytes!
  timestamp: BigInt!
  transactionHash: Bytes!
  blockNumber: BigInt!
  # Polymorphic fields
  amount: BigInt
  tokenId: BigInt
  lockupDuration: BigInt
  category: String
  buyer: Bytes
  seller: Bytes
  offerId: BigInt
}

enum ActivityType {
  STAKING_DEPOSIT
  STAKING_WITHDRAW
  STAKING_COMPOUND
  STAKING_AUTO_COMPOUND
  SKILL_ACTIVATED
  SKILL_DEACTIVATED
  SKILL_UPGRADED
  QUEST_COMPLETED
  ACHIEVEMENT_UNLOCKED
  NFT_MINT
  NFT_LIST
  NFT_SALE
  NFT_PURCHASE
  NFT_UNLIST
  OFFER_MADE
  OFFER_ACCEPTED
  OFFER_CANCELLED
  ROYALTY_PAID
  XP_GAINED
  LEVEL_UP
}

"""
✅ NUEVO: Global Statistics - Singleton para métricas globales
Permite queries rápidas de totales sin sumar todas las entidades
"""
type GlobalStats @entity(immutable: false) {
  id: ID! # "global"
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
  totalCompounded: BigInt!
  totalNFTsMinted: Int!
  totalNFTsSold: Int!
  totalMarketplaceVolume: BigInt!
  totalUsers: Int!
  totalActiveUsers: Int!
  lastUpdatedBlock: BigInt!
  updatedAt: BigInt!
}

"""
✅ NUEVO: Daily Statistics - Agregaciones diarias
Permite análisis de actividad por día sin procesar miles de eventos
"""
type DailyStats @entity(immutable: false) {
  id: ID! # "date-YYYY-MM-DD"
  date: BigInt!
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
  totalCompounded: BigInt!
  totalStakers: Int!
  totalNFTsMinted: Int!
  totalNFTsSold: Int!
  totalMarketplaceVolume: BigInt!
  uniqueUsers: Int!
  updatedAt: BigInt!
}

"""
✅ NUEVO: User Statistics - Agregaciones por usuario
Cache de métricas agregadas para evitar @derivedFrom queries
"""
type UserStats @entity(immutable: false) {
  id: Bytes! # user address
  user: User!
  totalStakingAmount: BigInt!
  currentStakingAmount: BigInt!
  totalRewardsEarned: BigInt!
  totalRoyaltiesReceived: BigInt!
  nftsMintedCount: Int!
  nftsSoldCount: Int!
  nftsBoughtCount: Int!
  totalMarketplaceVolume: BigInt!
  averageNFTPrice: BigInt
  level: Int!
  xp: BigInt!
  lastActivityAt: BigInt!
  createdAt: BigInt!
  updatedAt: BigInt!
}

"""
✅ NUEVO: NFT Statistics - Agregaciones por NFT
Métricas de mercado para cada NFT sin procesar todas sus ventas
"""
type NFTStats @entity(immutable: false) {
  id: String! # "tokenId-" concatenated (e.g., "12345")
  totalSales: Int!
  totalVolume: BigInt!
  averagePrice: BigInt
  floorPrice: BigInt
  highestPrice: BigInt
  lastSalePrice: BigInt
  lastSaleAt: BigInt
  holdersCount: Int!
  updatedAt: BigInt!
}

