"""
User entity - represents a wallet address
✅ OPTIMIZADO: Removidos @derivedFrom fields, agregados contadores directos
"""
type User @entity(immutable: false) {
  id: Bytes! # wallet address
  
  # ✅ Contadores directos (sin @derivedFrom)
  depositCount: Int!
  withdrawalCount: Int!
  compoundCount: Int!
  nftMintedCount: Int!
  nftSoldCount: Int!
  nftBoughtCount: Int!
  offersMadeCount: Int!
  
  # Skill & Quest counters (nullable for backward compatibility)
  skillPurchaseCount: Int
  skillRenewalCount: Int
  skillSwitchCount: Int
  questCompletionCount: Int
  
  # Totales agregados
  totalDeposited: BigInt!
  totalWithdrawn: BigInt!
  totalCompounded: BigInt!
  totalEarnings: BigInt
  totalSpent: BigInt
  
  # Métricas de gamificación
  level: Int!
  totalXP: BigInt!
  
  createdAt: BigInt!
  updatedAt: BigInt!
}

"""
Staking Deposit event
"""
type Deposit @entity(immutable: true) {
  id: ID! # tx hash + log index
  user: User!
  amount: BigInt!
  lockupDuration: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
  blockNumber: BigInt!
}

