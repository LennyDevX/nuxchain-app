specVersion: 0.0.5
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: SmartStaking
    network: matic
    source:
      address: "0x3C1F04C671B74D98Dbb32398741aBC2211A041cc"
      abi: SmartStaking
      startBlock: 76030976
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - Deposit
        - Withdrawal
        - Compound
        - Activity
      abis:
        - name: SmartStaking
          file: SmartStaking\SmartStaking.json
      eventHandlers:
        - event: DepositMade(indexed address,indexed uint256,uint256,uint256,indexed uint256)
          handler: handleDepositMade
        - event: WithdrawalMade(indexed address,uint256,uint256,indexed uint256,uint256)
          handler: handleWithdrawalMade
        - event: RewardsCompounded(indexed address,uint256)
          handler: handleRewardsCompounded
      file: SmartStaking\SmartStaking.wasm
  - kind: ethereum
    name: Marketplace
    network: matic
    source:
      address: "0x58B588d29335a050732f82E6A8551d0725981518"
      abi: Marketplace
      startBlock: 76032389
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - NFTMint
        - NFTList
        - NFTSale
        - NFTPurchase
        - NFTUnlist
        - OfferCreated
        - OfferAccepted
        - Activity
      abis:
        - name: Marketplace
          file: Marketplace\Marketplace.json
      eventHandlers:
        - event: TokenMinted(indexed uint256,indexed address,string,string)
          handler: handleTokenMinted
        - event: TokenListed(indexed uint256,indexed address,uint256,string)
          handler: handleTokenListed
        - event: TokenSold(indexed uint256,indexed address,indexed address,uint256)
          handler: handleTokenSold
        - event: TokenUnlisted(indexed uint256)
          handler: handleTokenUnlisted
        - event: OfferCreated(indexed uint256,indexed uint256,indexed address,uint256,uint256)
          handler: handleOfferCreated
        - event: OfferAccepted(indexed uint256,indexed uint256,address,address,uint256)
          handler: handleOfferAccepted
      file: Marketplace\Marketplace.wasm
