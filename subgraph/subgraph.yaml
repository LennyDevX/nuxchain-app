specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  # Enhanced Smart Staking Contract (NEW - v4.0.0)
  - kind: ethereum
    name: EnhancedSmartStaking
    network: matic
    source:
      address: "0xe7A0586f2fB63905BbC771Caf62BF0412cf9DbF3"
      abi: EnhancedSmartStaking
      startBlock: 78897900
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - Deposit
        - Withdrawal
        - Compound
        - Activity
        - SkillProfile
        - NFTSkill
        - Achievement
        - Quest
        - UserStats
        - GlobalStats
        - DailyStats
      abis:
        - name: EnhancedSmartStaking
          file: ./abis/EnhancedSmartStaking.json
      eventHandlers:
        - event: Deposited(indexed address,uint256,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
        - event: WithdrawAll(indexed address,uint256)
          handler: handleWithdrawAll
        - event: Compounded(indexed address,uint256)
          handler: handleCompounded
        - event: RewardsCompounded(indexed address,uint256)
          handler: handleRewardsCompounded
        - event: AutoCompounded(indexed address,uint256)
          handler: handleAutoCompounded
        - event: SkillActivated(indexed address,indexed uint256,uint8,uint16)
          handler: handleSkillActivated
        - event: SkillDeactivated(indexed address,indexed uint256,uint8)
          handler: handleSkillDeactivated
        - event: SkillProfileUpdated(indexed address,uint8,uint8,uint16)
          handler: handleSkillProfileUpdated
        - event: SkillUpgraded(indexed address,indexed uint256,uint8,uint256)
          handler: handleSkillUpgraded
      file: ./src/enhanced-smart-staking.ts
  
  # Gamified Marketplace - NEW MODULAR ARCHITECTURE (Core Contract)
  # Escucha eventos emitidos por GameifiedMarketplaceCore a través del Proxy
  - kind: ethereum
    name: GameifiedMarketplaceCore
    network: matic
    source:
      address: "0x8ee87263e8BBa54b51FD8FDc70a1E7FE33E7466e"
      abi: GameifiedMarketplaceCoreV1
      startBlock: 78899500
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - NFTMint
        - NFTList
        - NFTSale
        - NFTPurchase
        - NFTUnlist
        - OfferCreated
        - OfferAccepted
        - Activity
        - UserStats
        - GlobalStats
        - DailyStats
      abis:
        - name: GameifiedMarketplaceCoreV1
          file: ./abis/GameifiedMarketplaceCoreV1.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed uint256,string)
          handler: handleTokenCreated
        - event: TokenListed(indexed address,indexed uint256,uint256)
          handler: handleTokenListed
        - event: TokenSold(indexed address,indexed address,indexed uint256,uint256)
          handler: handleTokenSold
        - event: TokenUnlisted(indexed address,indexed uint256)
          handler: handleTokenUnlisted
        - event: OfferMade(indexed address,indexed uint256,uint256)
          handler: handleOfferMade
        - event: OfferAccepted(indexed address,indexed address,indexed uint256,uint256)
          handler: handleOfferAccepted
      file: ./src/gameified-marketplace.ts

  # Individual Skills Contract (NEW - IIndividualSkills)
