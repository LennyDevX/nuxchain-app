        - event: QuestProgressUpdated(indexed address,indexed uint256,uint256)
          handler: handleQuestProgressUpdated
        - event: SocialActionRecorded(indexed address,uint256)
          handler: handleSocialActionRecorded
      file: ./src/marketplace-quests.ts
