      abis:
        - name: GameifiedMarketplaceQuests
          file: ./abis/GameifiedMarketplaceQuests.json
      eventHandlers:
        - event: QuestCreated(indexed uint256,uint8,string,uint256,uint256)
          handler: handleQuestCreated
        - event: QuestCompleted(indexed address,indexed uint256,uint256)
          handler: handleQuestCompleted
        - event: QuestDeactivated(indexed uint256)
          handler: handleQuestDeactivated
        - event: QuestProgressUpdated(indexed address,indexed uint256,uint256)
          handler: handleQuestProgressUpdated
        - event: SocialActionRecorded(indexed address,uint256)
          handler: handleSocialActionRecorded
      file: ./src/marketplace-quests.ts
