        - event: SkillRenewed(indexed address,indexed uint256,uint256)
          handler: handleSkillRenewed
        - event: SkillSwitched(indexed address,indexed uint256,indexed uint256,uint8,uint256)
          handler: handleSkillSwitched
      file: ./src/marketplace-skills.ts

  # Marketplace Quests Contract (NEW - GameifiedMarketplaceQuests)
  - kind: ethereum
    name: GameifiedMarketplaceQuests
    network: matic
    source:
      address: "0xDE4Ad382b2E0A3C1dF2185EDd7d7b966c775E169"
