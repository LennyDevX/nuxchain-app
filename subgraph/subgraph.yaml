specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  # Enhanced Smart Staking Contract (NEW - v4.0.0)
  - kind: ethereum
    name: EnhancedSmartStaking
    network: matic
    source:
      address: "0x1E005153769F73327c4a74Ef3Dc03d53BDeB4DCe"
      abi: EnhancedSmartStaking
      startBlock: 78900000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - Deposit
        - Withdrawal
        - Compound
        - Activity
        - SkillProfile
        - NFTSkill
        - Achievement
        - Quest
        - UserStats
        - GlobalStats
        - DailyStats
      abis:
        - name: EnhancedSmartStaking
          file: ./abis/EnhancedSmartStaking.json
      eventHandlers:
        - event: Deposited(indexed address,uint256,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
        - event: WithdrawAll(indexed address,uint256)
          handler: handleWithdrawAll
        - event: Compounded(indexed address,uint256)
          handler: handleCompounded
        - event: RewardsCompounded(indexed address,uint256)
          handler: handleRewardsCompounded
        - event: AutoCompounded(indexed address,uint256)
          handler: handleAutoCompounded
        - event: SkillActivated(indexed address,indexed uint256,uint8,uint16)
          handler: handleSkillActivated
        - event: SkillDeactivated(indexed address,indexed uint256,uint8)
          handler: handleSkillDeactivated
        - event: SkillProfileUpdated(indexed address,uint8,uint8,uint16)
          handler: handleSkillProfileUpdated
        - event: SkillUpgraded(indexed address,indexed uint256,uint8,uint256)
          handler: handleSkillUpgraded
      file: ./src/enhanced-smart-staking.ts
  
  # Gamified Marketplace - NEW MODULAR ARCHITECTURE (Core Contract via Proxy)
  # Escucha eventos emitidos por GameifiedMarketplaceCore a través del Proxy
  - kind: ethereum
    name: GameifiedMarketplaceCore
    network: matic
    source:
      address: "0x3b0111517f7D622f9e011A726616627F5Fa4DFD8"
      abi: GameifiedMarketplaceCoreV1
      startBlock: 78900000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - NFTMint
        - NFTList
        - NFTSale
        - NFTPurchase
        - NFTUnlist
        - OfferCreated
        - OfferAccepted
        - Activity
        - UserStats
        - GlobalStats
        - DailyStats
      abis:
        - name: GameifiedMarketplaceCoreV1
          file: ./abis/GameifiedMarketplaceCoreV1.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed uint256,string)
          handler: handleTokenCreated
        - event: TokenListed(indexed address,indexed uint256,uint256)
          handler: handleTokenListed
        - event: TokenSold(indexed address,indexed address,indexed uint256,uint256)
          handler: handleTokenSold
        - event: TokenUnlisted(indexed address,indexed uint256)
          handler: handleTokenUnlisted
        - event: OfferMade(indexed address,indexed uint256,uint256)
          handler: handleOfferMade
        - event: OfferAccepted(indexed address,indexed address,indexed uint256,uint256)
          handler: handleOfferAccepted
      file: ./src/gameified-marketplace.ts

  # Individual Skills Contract (NEW - IndividualSkillsMarketplace)
  - kind: ethereum
    name: IndividualSkillsMarketplace
    network: matic
    source:
      address: "0x8B2a87A05a7703426b1Ad3D733c61Dd4B40fF538"
      abi: IndividualSkillsMarketplace
      startBlock: 78900000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - IndividualSkill
        - Activity
      abis:
        - name: IndividualSkillsMarketplace
          file: ./abis/IndividualSkillsMarketplace.json
      eventHandlers:
        - event: IndividualSkillActivated(indexed address,indexed uint256,uint8)
          handler: handleIndividualSkillActivated
        - event: IndividualSkillDeactivated(indexed address,indexed uint256,uint8)
          handler: handleIndividualSkillDeactivated
        - event: IndividualSkillExpired(indexed address,indexed uint256,uint8)
          handler: handleIndividualSkillExpired
        - event: IndividualSkillPurchased(indexed address,indexed uint256,uint8,uint8,uint256)
          handler: handleIndividualSkillPurchased
        - event: IndividualSkillRenewed(indexed address,indexed uint256,uint256)
          handler: handleIndividualSkillRenewed
        - event: IndividualSkillTransferred(indexed address,indexed address,indexed uint256,uint8)
          handler: handleIndividualSkillTransferred
      file: ./src/individual-skills.ts

  # Marketplace Skills V2 Contract (NEW - GameifiedMarketplaceSkillsV2)
  - kind: ethereum
    name: GameifiedMarketplaceSkillsV2
    network: matic
    source:
      address: "0xB2174934d746d0ADDFa1DF247bC0419ce44d3C95"
      abi: GameifiedMarketplaceSkillsV2
      startBlock: 78900000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - Activity
      abis:
        - name: GameifiedMarketplaceSkillsV2
          file: ./abis/GameifiedMarketplaceSkillsV2.json
      eventHandlers:
        - event: SkillAdded(indexed uint256,uint8,uint8)
          handler: handleSkillAdded
        - event: SkillDeactivatedManually(indexed address,indexed uint256,uint8)
          handler: handleSkillDeactivatedManually
        - event: SkillExpired(indexed address,indexed uint256,uint8)
          handler: handleSkillExpired
        - event: SkillNFTCreated(indexed address,indexed uint256,uint256,uint256)
          handler: handleSkillNFTCreated
        - event: SkillRenewed(indexed address,indexed uint256,uint256)
          handler: handleSkillRenewed
        - event: SkillSwitched(indexed address,indexed uint256,indexed uint256,uint8,uint256)
          handler: handleSkillSwitched
      file: ./src/marketplace-skills.ts

  # Marketplace Quests Contract (NEW - GameifiedMarketplaceQuests)
  - kind: ethereum
    name: GameifiedMarketplaceQuests
    network: matic
    source:
      address: "0x1cAc0986509f075f107E90B1E70e83A0684D53Ab"
      abi: GameifiedMarketplaceQuests
      startBlock: 78900000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - User
        - Quest
        - QuestProgress
