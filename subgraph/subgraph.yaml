      eventHandlers:
        - event: QuestCreated(indexed uint256,uint8,string,uint256,uint256)
          handler: handleQuestCreated
        - event: QuestCompleted(indexed address,indexed uint256,uint256)
          handler: handleQuestCompleted
        - event: QuestDeactivated(indexed uint256)
